  msg: 'xpath: Ignore entity ref nodes when computing node hash


    XPath queries only work reliably if entities are substituted.

    Nevertheless, it''s possible to query a document with entity reference

    nodes. xmllint even deletes entities when the `--dropdtd` option is

    passed, resulting in dangling pointers, so it''s best to skip entity

    reference nodes to avoid a use-after-free.


    Fixes #550.'
  msg_enhanced: 'xpath: Ignore entity ref nodes when computing node hash to prevent
    a use-after-free when `xmllint` is used with `--dropdtd` and an XPath query is
    executed on a document containing entity references that have been freed.


    Fixes #550.'
